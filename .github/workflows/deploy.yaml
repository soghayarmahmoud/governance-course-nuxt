name: Deploy Nuxt to GitHub Pages

on:
  push:
    branches: ["main"] # تأكد أن هذا هو اسم الـ branch الخاص بك
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # استخدم إصدار Node الخاص بك
          
      - name: Install dependencies
        run: npm install
        
      - name: Generate Static Files
        run: npm run generate
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # هذا هو المسار الصحيح لملفات Nuxt 3 بعد الـ Generate
          path: .output/public 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
